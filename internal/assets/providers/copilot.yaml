name: copilot
binary: gh
display_name: GitHub Copilot
api_key_env: GITHUB_TOKEN
models:
  - id: gpt-4o
    display: "GPT-4o"
    cost_input_per_1m: 0.00
    cost_output_per_1m: 0.00
  - id: claude-sonnet-4-6
    display: "Claude Sonnet 4.6"
    cost_input_per_1m: 0.00
    cost_output_per_1m: 0.00
  - id: gemini-2.0-flash
    display: "Gemini 2.0 Flash"
    cost_input_per_1m: 0.00
    cost_output_per_1m: 0.00
session:
  window_name: "{{.name}}:{{.model}}"
  launch_args:
    - copilot
  env: {}
