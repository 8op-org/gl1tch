# gl1tch sidecar descriptor for the Ollama provider plugin.
#
# Install: copy this file to ~/.config/glitch/wrappers/ollama.yaml
# and ensure `glitch-ollama` is on $PATH (run `make install`).
#
# Calling convention (gl1tch sidecar protocol):
#   input  — the prompt text, passed as stdin to glitch-ollama
#   vars   — key/value pairs; the gl1tch runner passes vars.model as --model <value>
#
# Supported vars (set in pipeline step `vars:` block):
#   model      (required) — Ollama model name, e.g. "llama3.2" or "qwen2.5"
#                           Passed to glitch-ollama as --model <value> by the gl1tch runner.
#                           Can also be provided directly as GLITCH_MODEL env var.
#
# Optional environment variables (for direct invocation or advanced use):
#   GLITCH_OLLAMA_URL       — Base URL of the Ollama daemon.
#                           Defaults to http://localhost:11434.
#
# Example pipeline step:
#   - id: generate
#     plugin: ollama
#     prompt: "Explain BubbleTea in one paragraph."
#     vars:
#       model: llama3.2

name: ollama
description: "Run local AI models via the Ollama daemon (https://ollama.com)"
kind: agent
command: glitch-ollama
# Models are discovered at runtime by running `glitch-ollama --list-models`.
# Add entries here only if you want to pin specific models regardless of what
# is installed locally — e.g. to add display labels or set a default.
# models:
#   - id: llama3.2:latest
#     label: "Llama 3.2"
#     default: true
