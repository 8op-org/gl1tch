name: wf-git-pulse
version: "1"
description: "Show what's happening in this git repo right now — commits, diff stat, and working tree status."

steps:
  - id: log
    executor: shell
    vars:
      cmd: "git log --oneline -10"

  - id: diffstat
    executor: shell
    vars:
      cmd: "git diff HEAD~3 --stat 2>/dev/null || git diff --stat 2>/dev/null || echo 'no diff'"

  - id: status
    executor: shell
    vars:
      cmd: "git status --short"
