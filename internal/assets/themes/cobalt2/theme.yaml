name: cobalt2
display_name: "Cobalt2"
mode: dark
palette:
  bg:      "#193549"
  fg:      "#ffffff"
  accent:  "#ffc600"
  dim:     "#3d6176"
  border:  "#0d2a3f"
  error:   "#ff0000"
  success: "#3ad900"
borders:
  style: light
statusbar:
  format: " {session} · {provider} · {model} "
  bg: palette.bg
  fg: palette.accent
header_style:
  panels:
    pipelines:
      accent: "#ffc600"
      text:   "#193549"
    agent_runner:
      accent: "#ffc600"
      text:   "#193549"
    signal_board:
      accent: "#ffc600"
      text:   "#193549"
    activity_feed:
      accent: "#ffc600"
      text:   "#193549"
    inbox:
      accent: "#ffc600"
      text:   "#193549"
    cron:
      accent: "#ffc600"
      text:   "#193549"
    log_output:
      accent: "#ffc600"
      text:   "#193549"
    modal:
      accent: "#ffc600"
      text:   "#193549"
modal:
  bg:       palette.bg
  border:   palette.accent
  title_bg: palette.accent
  title_fg: palette.bg
