name: github-dark
display_name: "GitHub Dark"
mode: dark
palette:
  bg:      "#0d1117"
  fg:      "#e6edf3"
  accent:  "#58a6ff"
  dim:     "#6e7681"
  border:  "#21262d"
  error:   "#f85149"
  success: "#3fb950"
borders:
  style: light
statusbar:
  format: " {session} · {provider} · {model} "
  bg: palette.bg
  fg: palette.accent
header_style:
  panels:
    pipelines:
      accent: "#58a6ff"
      text:   "#0d1117"
    agent_runner:
      accent: "#58a6ff"
      text:   "#0d1117"
    signal_board:
      accent: "#58a6ff"
      text:   "#0d1117"
    activity_feed:
      accent: "#58a6ff"
      text:   "#0d1117"
    inbox:
      accent: "#58a6ff"
      text:   "#0d1117"
    cron:
      accent: "#58a6ff"
      text:   "#0d1117"
    log_output:
      accent: "#58a6ff"
      text:   "#0d1117"
    modal:
      accent: "#58a6ff"
      text:   "#0d1117"
modal:
  bg:       palette.bg
  border:   palette.accent
  title_bg: palette.accent
  title_fg: palette.bg
