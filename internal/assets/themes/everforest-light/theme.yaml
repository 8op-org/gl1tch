    signal_board:
      accent: "#8da101"
      text:   "#5c6a72"
    activity_feed:
      accent: "#8da101"
      text:   "#5c6a72"
    inbox:
      accent: "#8da101"
      text:   "#5c6a72"
    cron:
      accent: "#8da101"
      text:   "#5c6a72"
    log_output:
      accent: "#8da101"
      text:   "#5c6a72"
    modal:
      accent: "#8da101"
      text:   "#5c6a72"
