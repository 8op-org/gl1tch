      text:   "#161821"
    activity_feed:
      accent: "#84a0c6"
      text:   "#161821"
    inbox:
      accent: "#84a0c6"
      text:   "#161821"
    cron:
      accent: "#84a0c6"
      text:   "#161821"
    log_output:
      accent: "#84a0c6"
      text:   "#161821"
