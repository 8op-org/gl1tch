name: abs
display_name: "ABS Dark"
mode: dark
palette:
  bg:      "#282a36"
  fg:      "#f8f8f2"
  accent:  "#bd93f9"
  dim:     "#6272a4"
  border:  "#44475a"
  error:   "#ff5555"
  success: "#50fa7b"
borders:
  style: light
statusbar:
  format: " {session} · {provider} · {model} "
  bg: palette.bg
  fg: palette.accent
splash: splash.ans

header_style:
  panels:
    pipelines:
      accent: "#bd93f9"
      text:   "#282a36"
    agent_runner:
      accent: "#bd93f9"
      text:   "#282a36"
    signal_board:
      accent: "#bd93f9"
      text:   "#282a36"
    activity_feed:
      accent: "#bd93f9"
      text:   "#282a36"
    inbox:
      accent: "#bd93f9"
      text:   "#282a36"
    cron:
      accent: "#bd93f9"
      text:   "#282a36"
    log_output:
      accent: "#bd93f9"
      text:   "#282a36"
    modal:
      accent: "#bd93f9"
      text:   "#282a36"

modal:
  bg: palette.bg
  border: palette.accent
  title_bg: palette.accent
  title_fg: palette.bg
