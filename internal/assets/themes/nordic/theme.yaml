    activity_feed:
      accent: "#81a1c1"
      text:   "#2e3440"
    inbox:
      accent: "#81a1c1"
      text:   "#2e3440"
    cron:
      accent: "#81a1c1"
      text:   "#2e3440"
    log_output:
      accent: "#81a1c1"
      text:   "#2e3440"
