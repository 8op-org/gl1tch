name: jellybeans
display_name: "Jellybeans"
mode: dark
palette:
  bg:      "#1c1c1c"
  fg:      "#e8e8d3"
  accent:  "#8197bf"
  dim:     "#888888"
  border:  "#333333"
  error:   "#cf6a4c"
  success: "#8f9d6a"
borders:
  style: light
statusbar:
  format: " {session} · {provider} · {model} "
  bg: palette.bg
  fg: palette.accent
header_style:
  panels:
    pipelines:
      accent: "#8197bf"
      text:   "#1c1c1c"
    agent_runner:
      accent: "#8197bf"
      text:   "#1c1c1c"
    signal_board:
      accent: "#8197bf"
      text:   "#1c1c1c"
    activity_feed:
      accent: "#8197bf"
      text:   "#1c1c1c"
    inbox:
      accent: "#8197bf"
      text:   "#1c1c1c"
    cron:
      accent: "#8197bf"
      text:   "#1c1c1c"
    log_output:
      accent: "#8197bf"
      text:   "#1c1c1c"
    modal:
      accent: "#8197bf"
      text:   "#1c1c1c"
modal:
  bg:       palette.bg
  border:   palette.accent
  title_bg: palette.accent
  title_fg: palette.bg
