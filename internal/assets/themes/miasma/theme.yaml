      accent: "#78824b"
      text:   "#1c1c1c"
    activity_feed:
      accent: "#78824b"
      text:   "#1c1c1c"
    inbox:
      accent: "#78824b"
      text:   "#1c1c1c"
    cron:
      accent: "#78824b"
      text:   "#1c1c1c"
    log_output:
      accent: "#78824b"
      text:   "#1c1c1c"
