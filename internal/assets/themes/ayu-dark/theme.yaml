      accent: "#39bae6"
      text:   "#0d1017"
    signal_board:
      accent: "#39bae6"
      text:   "#0d1017"
    activity_feed:
      accent: "#39bae6"
      text:   "#0d1017"
    inbox:
      accent: "#39bae6"
      text:   "#0d1017"
    cron:
      accent: "#39bae6"
      text:   "#0d1017"
    log_output:
      accent: "#39bae6"
      text:   "#0d1017"
    modal:
      accent: "#39bae6"
      text:   "#0d1017"
modal:
