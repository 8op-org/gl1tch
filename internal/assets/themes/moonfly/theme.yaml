name: moonfly
display_name: "Moonfly"
mode: dark
palette:
  bg:      "#080808"
  fg:      "#b2b2b2"
  accent:  "#74b2ff"
  dim:     "#4e4e4e"
  border:  "#1c1c1c"
  error:   "#ff5454"
  success: "#8cc85f"
borders:
  style: light
statusbar:
  format: " {session} · {provider} · {model} "
  bg: palette.bg
  fg: palette.accent
header_style:
  panels:
    pipelines:
      accent: "#74b2ff"
      text:   "#080808"
    agent_runner:
      accent: "#74b2ff"
      text:   "#080808"
    signal_board:
      accent: "#74b2ff"
      text:   "#080808"
    activity_feed:
      accent: "#74b2ff"
      text:   "#080808"
    inbox:
      accent: "#74b2ff"
      text:   "#080808"
    cron:
      accent: "#74b2ff"
      text:   "#080808"
    log_output:
      accent: "#74b2ff"
      text:   "#080808"
    modal:
      accent: "#74b2ff"
      text:   "#080808"
modal:
  bg:       palette.bg
  border:   palette.accent
  title_bg: palette.accent
  title_fg: palette.bg
