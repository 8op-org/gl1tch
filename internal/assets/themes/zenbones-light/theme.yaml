name: zenbones-light
display_name: "Zenbones Light"
mode: light
palette:
  bg:      "#f0edec"
  fg:      "#4c3b37"
  accent:  "#407a9e"
  dim:     "#a39890"
  border:  "#ddd8d6"
  error:   "#b56a6a"
  success: "#5e9161"
borders:
  style: light
statusbar:
  format: " {session} · {provider} · {model} "
  bg: palette.bg
  fg: palette.accent
header_style:
  panels:
    pipelines:
      accent: "#407a9e"
      text:   "#4c3b37"
    agent_runner:
      accent: "#407a9e"
      text:   "#4c3b37"
    signal_board:
      accent: "#407a9e"
      text:   "#4c3b37"
    activity_feed:
      accent: "#407a9e"
      text:   "#4c3b37"
    inbox:
      accent: "#407a9e"
      text:   "#4c3b37"
    cron:
      accent: "#407a9e"
      text:   "#4c3b37"
    log_output:
      accent: "#407a9e"
      text:   "#4c3b37"
    modal:
      accent: "#407a9e"
      text:   "#4c3b37"
modal:
  bg:       palette.bg
  border:   palette.accent
  title_bg: palette.accent
  title_fg: palette.bg
