# gl1tch sidecar descriptor for the OpenAI Codex provider plugin.
#
# Install: copy this file to ~/.config/glitch/wrappers/codex.yaml
# and ensure `glitch-codex` is on $PATH (run `make install`).
#
# Prerequisites: Codex CLI installed and authenticated.
#   npm install -g @openai/codex
#
# Calling convention:
#   input  — the prompt text, passed as stdin to glitch-codex
#   vars   — GLITCH_MODEL sets the model (optional)

name: codex
description: "OpenAI Codex coding agent (https://github.com/openai/codex)"
kind: agent
command: glitch-codex
models:
  - id: codex-mini-latest
    label: "Codex Mini (Latest)"
  - id: o4-mini
    label: "o4-mini"
  - id: o3
    label: "o3"
