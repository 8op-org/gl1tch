version: '3'

tasks:
  build:
    desc: Build the full binary (GUI + Go)
    deps: [gui:build]
    cmds:
      - go build -o glitch .

  gui:build:
    desc: Build GUI frontend for embedding
    dir: gui
    cmds:
      - npm run build

  gui:test:
    desc: Run GUI Playwright tests
    deps: [build]
    dir: gui
    cmds:
      - npx playwright test

  gui:dev:
    desc: Run Go backend + Vite dev server together
    deps: [gui:dev:backend, gui:dev:frontend]

  gui:dev:backend:
    desc: Run Go backend in dev mode
    cmds:
      - go run . workspace gui --dev

  gui:dev:frontend:
    desc: Run Vite dev server
    dir: gui
    cmds:
      - npm run dev

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f glitch
      - rm -rf internal/gui/dist
      - rm -rf gui/dist
      - rm -rf gui/test-results
