---
name: agent-with-skill
description: |
  Demonstrates the agent executor with skill injection.
  Runs a Claude agent with the reviewer-verify skill to review staged changes.

steps:
  - id: diff
    run: git diff --cached --stat && git diff --cached

  - id: review
    llm:
      provider: claude
      skill: reviewer-verify
      prompt: |
        Review these staged changes for correctness, security, and style:

        {{step "diff"}}

  - id: save-review
    save: review-output.md
    save_step: review
