name: github-pr-review
description: Fetch and review a GitHub pull request

steps:
  - id: fetch-pr
    run: |
      gh pr view "{{.input}}" --json number,title,body,additions,deletions,changedFiles,baseRefName,headRefName,author,labels,reviewDecision,state,mergeable,reviews

  - id: fetch-diff
    run: |
      gh pr diff "{{.input}}"

  - id: fetch-comments
    run: |
      gh pr view "{{.input}}" --json comments,reviews --jq '[.comments[],.reviews[]] | sort_by(.createdAt) | .[] | "\(.author.login) (\(.state // "COMMENTED"), \(.createdAt)):\n\(.body)\n"'

  - id: review
    llm:
      provider: claude
      model: claude-haiku-4-5-20251001
      prompt: |
        You are helping a developer understand the current state of a pull request.
        Report what is actually happening — do NOT give your own approval or verdict.
        Your job is to surface what reviewers have said and what's still blocking.

        Structure:
        1. **Status** — current review decision (APPROVED, CHANGES_REQUESTED, PENDING), mergeable state, CI status
        2. **Summary** — one sentence on what this PR does
        3. **What reviewers said** — summarize each reviewer's feedback and whether their concerns have been addressed
        4. **What's blocking** — concrete list of unresolved items that need action before this can merge
        5. **Suggested next steps** — what the PR author should do next

        PR metadata (includes reviewDecision and state):
        {{step "fetch-pr"}}

        Review comments and discussion:
        {{step "fetch-comments"}}

        Full diff:
        {{step "fetch-diff"}}
