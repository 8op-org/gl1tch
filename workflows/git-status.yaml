name: git-status
description: Summarize the current git status

steps:
  - id: status
    run: git status --short

  - id: branch
    run: git branch --show-current

  - id: log
    run: git log --oneline -5

  - id: format
    llm:
      prompt: |
        Give a brief status report for this git repo:

        Current branch: {{step "branch"}}

        Working tree:
        {{step "status"}}

        Recent commits:
        {{step "log"}}
